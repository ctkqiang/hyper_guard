name: 发布到 GitCode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release_android:
    name: 发布 Android 应用
    runs-on: euleros-2.10.1

    steps:
      - name: 检出代码
        uses: checkout-action@0.0.1
        with:
          path: repo_workspace

      - name: 设置 Flutter 3.41.8
        run: |
          cd repo_workspace
          FLUTTER_VERSION=3.41.8
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
          tar xf flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: 安装依赖并运行测试
        run: |
          cd repo_workspace
          flutter pub get
          flutter test
        continue-on-error: true

      - name: 构建 AppBundle 与 APK
        run: |
          cd repo_workspace
          flutter build appbundle --release
          flutter build apk --release

      - name: 创建 Release 并上传产物
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          VERSION_TAG: "v$(date +'%Y%m%d%H%M%S')"
          PROJECT_ID: ${{ CI_PROJECT_ID }}
          PROJECT_PATH: ${{ CI_PROJECT_PATH }}
        run: |
          cd repo_workspace
          sudo apt-get update && sudo apt-get install -y jq

          PROJECT_REF="${PROJECT_ID:-$PROJECT_PATH}"
          if [ -z "$PROJECT_REF" ]; then
            echo "ERROR: 无法获取项目标识，CI_PROJECT_ID 和 CI_PROJECT_PATH 均未设置"
            exit 1
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITCODE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$VERSION_TAG\",
              \"name\": \"Release $VERSION_TAG\",
              \"body\": \"CI/CD 自动发布的版本\"
            }" \
            "https://gitcode.net/api/v4/projects/${PROJECT_REF}/releases")

          if echo "$RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
            echo "创建 Release 失败: $RESPONSE"
            exit 1
          fi

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets.links.upload_url' | sed 's/{?name,link}//')

          curl -s -X POST \
            -H "Authorization: token $GITCODE_TOKEN" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk" \
            "$UPLOAD_URL?name=app-release.apk"

      - name: 列出构建产物
        run: |
          cd repo_workspace
          find build -type f