name: 发布到 GitHub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release_android:
    name: 发布 Android 应用
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 生成版本号
        id: version
        run: echo "tag=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: 设置 Flutter 3.41.8（包含 Dart 3.11+）
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'

      - name: 安装依赖并运行测试
        run: |
          flutter pub get
          flutter test
        continue-on-error: true

      - name: 构建 AppBundle 与 APK
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: 上传 APK 到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 列出构建产物
        run: find build -type f