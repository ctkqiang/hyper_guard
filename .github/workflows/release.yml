name: 发布到 GitHub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release_android:
    name: 发布 Android 应用
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Flutter（指定包含 Dart 3.11+ 的版本）
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'   # 该版本内置 Dart 3.11.2，满足 ^3.11.5

      - name: 安装依赖并运行测试
        run: |
          flutter pub get
          flutter test
        continue-on-error: true

      - name: 构建 AppBundle 与 APK
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: 上传 AAB 到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 APK 到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 列出构建产物
        run: find build -type f