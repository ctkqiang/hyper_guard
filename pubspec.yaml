name: hyper_guard
description: "HyperGuard - HyperOS Security Sandbox System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7
  fl_chart: ^0.70.2
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.1
  uuid: ^4.5.1
  file_picker: ^8.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/applogo.png

flutter_launcher_icons:
  android: true
  image_path: "assets/applogo.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/applogo.png"
